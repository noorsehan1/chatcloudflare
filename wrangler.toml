name = "chatserver3"
main = "index.js"
compatibility_date = "2026-04-14"

# ==================== FREE TIER OPTIMIZATION ====================
# Tanpa Durable Objects (lebih stabil untuk free tier)
# Tanpa Migrations
# Semua state disimpan di memory (global variable)

# ==================== LIMITS ====================
[limits]
cpu_ms = 30

