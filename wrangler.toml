name = "chatcloudflare"
main = "index.js"
compatibility_date = "2026-04-03"

# ==================== FREE TIER OPTIMIZATION ====================
# Tidak menggunakan Durable Objects untuk menghindari timeout
# WebSocket langsung dihandle oleh Worker stateless

# ==================== VARIABLES LINGKUNGAN (Opsional) ====================
# [vars]
# ENVIRONMENT = "production"
# MAX_CONNECTIONS = "80"

# ==================== OBSERVABILITY (Opsional) ====================
# [observability]
# enabled = true
# head_sampling_rate = 0.1

# ==================== CATATAN PENTING ====================
# 1. HAPUS semua konfigurasi durable_objects jika sebelumnya ada
# 2. Jika sebelumnya sudah deploy dengan Durable Objects, 
#    buat worker baru dengan nama berbeda atau hapus migration lama
